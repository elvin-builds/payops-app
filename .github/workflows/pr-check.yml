# ════════════════════════════════════════════════════════════
# PR CHECK PIPELINE
# PR açılanda avtomatik işləyir
# Bütün check-lər keçməsə merge mümkün olmur
# ════════════════════════════════════════════════════════════

name: PR Check

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'

# PR yeniləndikdə köhnə run-u cancel et (resource qənaəti)
concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ─── Job 1: Lint + Test ─────────────────────────────────
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Root dependencies (eslint, jest)
      - name: Install root dependencies
        run: npm ci

      # Service dependencies (test-lər üçün lazım olan paketlər)
      - name: Install service dependencies
        run: |
          for dir in services/*/; do
            if [ -f "$dir/package.json" ]; then
              echo "Installing deps for $dir"
              cd "$dir" && npm ci && cd ../..
            fi
          done

      - name: Run ESLint
        run: npm run lint

      - name: Run unit tests
        run: npm run test:coverage

      # Test nəticəsini PR-da göstər
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 5

  # ─── Job 2: Docker Build Test ───────────────────────────
  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: lint-and-test

    strategy:
      matrix:
        service:
          - auth-service
          - transaction-service
          - worker-service
          - notification-service
          - api-gateway
          - frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Image build olur mu? Error varsa PR fail olur
      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service == 'frontend' && './frontend' || format('./services/{0}', matrix.service) }}
          push: false
          tags: payops/${{ matrix.service }}:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Job 3: Security Scan ──────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Dependency vulnerability scan
      - name: Run npm audit
        run: |
          echo "=== Scanning root ==="
          npm audit --audit-level=critical || true
          for dir in services/*/; do
            if [ -f "$dir/package.json" ]; then
              echo "=== Scanning $dir ==="
              cd "$dir" && npm audit --audit-level=critical || true && cd ../..
            fi
          done

      # Trivy filesystem scan (source code vulnerabilities)
      - name: Run Trivy FS scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          # İlk mərhələdə exit-code 0 edib warning kimi göstərə bilərsən
          # Production-a yaxınlaşdıqca 1 edib fail etdirəcəyik

      # Secret scanning — repo-da password/key axtarır
      - name: Check for secrets in code
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified
