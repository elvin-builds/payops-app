name: Build and Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  NODE_VERSION: "20"
  ACR_NAME: "payopsdevacr"

jobs:
  test:
    name: Test Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install root dependencies
        run: npm install

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test

  build-and-push:
    name: Build and Push ${{ matrix.image }}
    runs-on: ubuntu-latest
    needs: test

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: auth-service
            context: ./services/auth-service
          - image: transaction-service
            context: ./services/transaction-service
          - image: worker-service
            context: ./services/worker-service
          - image: notification-service
            context: ./services/notification-service
          - image: api-gateway
            context: ./services/api-gateway
          - image: frontend
            context: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to Azure Container Registry
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Set image metadata
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          IMAGE="${{ secrets.ACR_LOGIN_SERVER }}/${{ matrix.image }}"

          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          docker build \
            -t "${{ steps.meta.outputs.image }}:${{ github.sha }}" \
            -t "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.short_sha }}" \
            -t "${{ steps.meta.outputs.image }}:latest" \
            "${{ matrix.context }}"

      - name: Push Docker image
        run: |
          docker push "${{ steps.meta.outputs.image }}:${{ github.sha }}"
          docker push "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.short_sha }}"
          docker push "${{ steps.meta.outputs.image }}:latest"

      - name: Show pushed image
        run: |
          echo "Pushed images:"
          echo "${{ steps.meta.outputs.image }}:${{ github.sha }}"
          echo "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.short_sha }}"
          echo "${{ steps.meta.outputs.image }}:latest"

  deploy:
    name: Deploy to AKS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --cluster-name ${{ secrets.AKS_CLUSTER_NAME }} \
            --overwrite-existing

      - name: Create namespace if not exists
        run: kubectl create namespace payops-dev --dry-run=client -o yaml | kubectl apply -f -

      - name: Ensure secrets exist
        run: |
          if ! kubectl get secret payops-secrets -n payops-dev > /dev/null 2>&1; then
            echo "WARNING: payops-secrets not found in payops-dev namespace"
            echo "Deploy will continue but pods may fail to start"
            echo "Run: kubectl create secret generic payops-secrets -n payops-dev --from-literal=DB_PASSWORD=<pass> --from-literal=JWT_SECRET=<secret> --from-literal=RABBITMQ_DEFAULT_USER=payops --from-literal=RABBITMQ_DEFAULT_PASS=payops123"
          fi

      - name: Deploy with Helm
        run: |
          helm upgrade --install payops ./helm/payops \
            --namespace payops-dev \
            --set global.imageTag=${{ github.sha }} \
            --wait \
            --timeout 5m

      - name: Verify deployment
        run: |
          echo "=== Pod Status ==="
          kubectl get pods -n payops-dev
          echo ""
          echo "=== Services ==="
          kubectl get svc -n payops-dev
          echo ""
          echo "=== Ingress ==="
          kubectl get ingress -n payops-dev
