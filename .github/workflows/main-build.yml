# ════════════════════════════════════════════════════════════
# MAIN BUILD PIPELINE
# main branch-ə merge olanda işləyir
# Image build → scan → SBOM → push to registry
# ════════════════════════════════════════════════════════════

name: Build & Push

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'

env:
  # ACR (Azure Container Registry) — Phase 5-də Terraform ilə yaradılacaq
  # Hələlik GitHub Container Registry (ghcr.io) istifadə edəcəyik
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/payops

jobs:
  # ─── Job 1: Test ────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - name: Install service dependencies
        run: |
          for dir in services/*/; do
            [ -f "$dir/package.json" ] && (cd "$dir" && npm ci && cd ../..)
          done

      - run: npm run lint
      - run: npm test

  # ─── Job 2: Build, Scan, Push ───────────────────────────
  build-and-push:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write        # ghcr.io-ya push üçün
      security-events: write # Trivy nəticələrini GitHub Security tab-a göndərmək üçün

    strategy:
      matrix:
        include:
          - service: auth-service
            context: ./services/auth-service
          - service: transaction-service
            context: ./services/transaction-service
          - service: worker-service
            context: ./services/worker-service
          - service: notification-service
            context: ./services/notification-service
          - service: api-gateway
            context: ./services/api-gateway
          - service: frontend
            context: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ─── Registry Login ──────────────────────────────────
      # ghcr.io üçün GITHUB_TOKEN kifayətdir
      # ACR üçün: azure/login action + ACR credentials lazım olacaq
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ─── Image Metadata ──────────────────────────────────
      # Commit SHA ilə tag: hansı commit-dən build olduğu bəllidir
      # latest tag: ən son uğurlu build
      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      # ─── Build & Push ────────────────────────────────────
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ─── Trivy Image Scan ───────────────────────────────
      # CRITICAL vulnerability varsa pipeline fail olur
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:latest
          format: 'sarif'
          output: 'trivy-${{ matrix.service }}.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'   # Phase 12-də '1' edəcəyik (security hardening)

      # Scan nəticəsi GitHub Security tab-da görünür
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-${{ matrix.service }}.sarif'
          category: 'trivy-${{ matrix.service }}'

      # ─── SBOM Generation ─────────────────────────────────
      # Software Bill of Materials: image-dəki bütün paketlərin siyahısı
      # Supply chain security üçün vacibdir
      - name: Generate SBOM
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:latest
          format: 'cyclonedx'
          output: 'sbom-${{ matrix.service }}.json'
          scan-type: 'image'

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.service }}
          path: 'sbom-${{ matrix.service }}.json'
          retention-days: 30

  # ─── Job 3: Post-Build Summary ──────────────────────────
  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: build-and-push
    if: always()

    steps:
      - name: Build Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Image | Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|-----|" >> $GITHUB_STEP_SUMMARY
          for svc in auth-service transaction-service worker-service notification-service api-gateway frontend; do
            echo "| $svc | ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-$svc | ${GITHUB_SHA::7} |" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
