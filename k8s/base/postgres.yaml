apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: payops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - configMapRef:
                name: payops-config
            - secretRef:
                name: payops-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: payops
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
