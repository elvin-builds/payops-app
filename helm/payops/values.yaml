global:
  namespace: payops-dev
  imageRegistry: payopsdevacr.azurecr.io
  imageTag: latest
  imagePullPolicy: Always
  environment: dev

config:
  dbHost: payopsdevpg.postgres.database.azure.com
  dbPort: "5432"
  dbName: payops
  dbUser: payopsadmin
  dbSsl: "true"
  jwtExpiry: "1h"
  rabbitmqUrl: amqp://payops:payops123@rabbitmq:5672

secrets:
  existingSecret: payops-secrets

rabbitmq:
  enabled: true
  image: rabbitmq:3.13-management-alpine
  usernameKey: RABBITMQ_DEFAULT_USER
  passwordKey: RABBITMQ_DEFAULT_PASS

services:
  authService:
    name: auth-service
    image: auth-service
    port: 8081
    replicas: 1
    healthPath: /health

  transactionService:
    name: transaction-service
    image: transaction-service
    port: 8082
    replicas: 1
    healthPath: /health

  notificationService:
    name: notification-service
    image: notification-service
    port: 8083
    replicas: 1
    healthPath: /health

  workerService:
    name: worker-service
    image: worker-service
    port: 8084
    replicas: 1
    healthPath: /health
    healthEnvName: HEALTH_PORT

  apiGateway:
    name: api-gateway
    image: api-gateway
    port: 8080
    replicas: 1
    healthPath: /health

frontend:
  name: frontend
  image: frontend
  port: 3000
  servicePort: 3000
  replicas: 1
  healthPath: /health

ingress:
  enabled: true
  className: nginx
  host: ""
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
